<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FlapMaster</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: skyblue;
}

canvas {
  background: #70c5ce;
  display: block;
  margin: auto;
  border: 2px solid black;
}
</style>
</head>

<body>

<h1>🐦 FlapMaster</h1>
<p>Score: <span id="score">0</span> | 💰 Coins: <span id="coins">0</span></p>

<canvas id="game" width="300" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = { x: 50, y: 150, v: 0 };
let gravity = 0.5;
let score = 0;
let coins = 0;

let pipes = [];

function jump() {
  bird.v = -8;
}

document.addEventListener("keydown", jump);
document.addEventListener("click", jump);

function createPipe() {
  let gap = 100;
  let top = Math.random() * 200 + 50;

  pipes.push({
    x: 300,
    top: top,
    bottom: top + gap,
    passed: false
  });
}

setInterval(createPipe, 2000);

function reset() {
  alert("💥 Perdu !");
  bird.y = 150;
  bird.v = 0;
  pipes = [];
  score = 0;
  coins = 0;
}

function update() {
  bird.v += gravity;
  bird.y += bird.v;

  ctx.clearRect(0, 0, 300, 400);

  // 🐦 oiseau
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, 10, 0, Math.PI * 2);
  ctx.fill();

  // 🕳️ pipes
  pipes.forEach(p => {
    p.x -= 2;

    ctx.fillStyle = "green";
    ctx.fillRect(p.x, 0, 30, p.top);
    ctx.fillRect(p.x, p.bottom, 30, 400);

    // collision
    if (
      bird.x > p.x &&
      bird.x < p.x + 30 &&
      (bird.y < p.top || bird.y > p.bottom)
    ) {
      reset();
    }

    // score + coins
    if (!p.passed && p.x + 30 < bird.x) {
      score++;
      coins++;
      p.passed = true;

      document.getElementById("score").innerText = score;
      document.getElementById("coins").innerText = coins;
    }
  });

  // sol / plafond
  if (bird.y > 400 || bird.y < 0) {
    reset();
  }

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
