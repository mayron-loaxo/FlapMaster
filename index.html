<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flappy Game</title>
  <style>
    body { text-align:center; font-family:Arial; }
    canvas { background:#70c5ce; display:block; margin:auto; }
  </style>
</head>
<body>

<h1>Flappy Game 🐦</h1>
<canvas id="game" width="300" height="400"></canvas>
<p>Score : <span id="score">0</span></p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = { x: 50, y: 150, gravity: 1, velocity: 0 };
let pipes = [];
let score = 0;

// saut
document.addEventListener("keydown", () => {
  bird.velocity = -10;
});

// pipes
function createPipe() {
  let height = Math.random() * 200 + 50;
  pipes.push({ x: 300, y: 0, height: height });
}

setInterval(createPipe, 2000);

// boucle jeu
function update() {
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  ctx.clearRect(0, 0, 300, 400);

  // oiseau
  ctx.fillStyle = "yellow";
  ctx.fillRect(bird.x, bird.y, 20, 20);

  // pipes
  ctx.fillStyle = "green";
  pipes.forEach(pipe => {
    pipe.x -= 2;
    ctx.fillRect(pipe.x, 0, 30, pipe.height);
    ctx.fillRect(pipe.x, pipe.height + 100, 30, 400);

    if (pipe.x === bird.x) score++;
  });

  document.getElementById("score").innerText = score;

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
