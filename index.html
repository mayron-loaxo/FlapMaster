<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test écran vert</title>

<style>
body {
  margin: 0;
  background: black;
}

canvas {
  display: block;
  margin: auto;
}
</style>
</head>

<body>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// boucle
function update() {
  // 🟩 écran vert
  ctx.fillStyle = "green";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // petit texte
  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("ECRAN VERT OK 👍", 100, 300);

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
